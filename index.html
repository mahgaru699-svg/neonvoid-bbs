<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEONVOID.BBS v9</title>

<style>
body{
  font-family: Arial;
  background:#2f3b2f;
  margin:20px;
  color:#e6f2e6;
}

.header{
  text-align:center;
  margin-bottom:10px;
}

.header img{
  max-width:380px;
  border:2px solid #556b2f;
  box-shadow:0 0 15px #000;
}

.nav a{
  color:#b6ff8a;
  margin:0 8px;
  cursor:pointer;
  text-decoration: underline;
}

.post{
  border:1px solid #556b2f;
  background:#3f4f3f;
  padding:8px;
  margin:8px 0;
}

textarea{
  width:100%;
  height:100px;
  background:#1f2a1f;
  color:#e6f2e6;
  border:1px solid #556b2f;
}

button{
  margin:5px 0;
  background:#556b2f;
  border:1px solid #9acd32;
  color:#fff;
  cursor:pointer;
}

button:hover{
  background:#6b8e23;
}

.admin{
  border:2px solid #9acd32;
  padding:10px;
  background:#1f2a1f;
}

img{
  max-width:260px;
  display:block;
  margin-top:5px;
  border:1px solid #556b2f;
}

.quote{
  color:#9acd32;
}

.gold{
  color:gold;
  font-weight:bold;
}

.footer{
  text-align:center;
  margin-top:80px;
  font-size:11px;
  opacity:0.4;
}

.rules{
  background:#1f2a1f;
  padding:10px;
  border:1px solid #556b2f;
}
</style>
</head>

<body>

<div class="header">

  <!-- 🖼️ ТВОЙ ЛОГО (починено) -->
  <img src="https://i.ibb.co/xtYZ6sjK/Chat-GPT-Image-22-2026-04-20-35.png"
       alt="NEONVOID LOGO">

  <div class="nav">
    <a onclick="go('forum')">Forum</a>
    <a onclick="go('rules')">Rules</a>
    <a onclick="board('frontline')">Frontline</a>
    <a onclick="board('intel')">Intel</a>
    <a onclick="board('field')">Field</a>
    <a onclick="board('art')">Art</a>
  </div>
</div>

<button onclick="newThread()">New Thread</button>
<button onclick="adminPanel()">Admin</button>

<div id="app"></div>

<div class="footer">
  Created in 2026 — For you with soul
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  updateDoc,
  doc,
  deleteDoc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtTTArBPBNHmZZJSytqjaRwA3nXvANBV0",
  authDomain: "neonevvvoid.firebaseapp.com",
  projectId: "neonevvvoid",
  storageBucket: "neonevvvoid.firebasestorage.app",
  messagingSenderId: "795809430469",
  appId: "1:795809430469:web:21f76f22dee7f7c14329ac"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let currentBoard = "frontline";
let currentThread = null;
let last = 0;
let view = "forum";

/* ===== FIXED ADM ===== */
function getAnon(){
  return "adm15 👑";
}

/* ===== SPAM ===== */
function spam(){
  let now = Date.now();
  if(now-last<2000) return false;
  last=now;
  return true;
}

/* ===== ROUTER FIX ===== */
window.go = function(v){
  view=v;
  render();
};

/* ===== BOARDS ===== */
window.board=function(b){
  currentBoard=b;
  view="forum";
  render();
};

/* ===== NEW THREAD ===== */
window.newThread=async function(){
  if(!spam()) return;

  let t=prompt("Title:");
  let c=prompt("Text:");
  if(!t||!c) return;

  await addDoc(collection(db,"threads"),{
    title:t,
    content:c,
    board:currentBoard,
    createdAt:Date.now(),
    bumpedAt:Date.now()
  });
};

/* ===== OPEN THREAD ===== */
window.openThread=function(id,t,c){

  currentThread=id;

  document.getElementById("app").innerHTML=`
    <h3>${t}</h3>
    <div class="post">${c}</div>

    <textarea id="txt"></textarea>
    <input type="file" id="img">
    <button onclick="reply()">Send</button>

    <div id="replies"></div>
  `;

  listen(id);
};

/* ===== REPLY ===== */
window.reply=async function(){

  if(!spam()) return;

  let txt=document.getElementById("txt").value;
  let file=document.getElementById("img").files[0];

  let img=null;

  if(file){
    let r=ref(storage,"img/"+Date.now()+file.name);
    await uploadBytes(r,file);
    img=await getDownloadURL(r);
  }

  await addDoc(collection(db,"posts"),{
    threadId:currentThread,
    content:txt,
    author:getAnon(),
    image:img,
    id:Date.now()
  });

  await updateDoc(doc(db,"threads",currentThread),{
    bumpedAt:Date.now()
  });
};

/* ===== RULES ===== */
function rules(){
  document.getElementById("app").innerHTML=`
  <div class="rules">
    <h3>NEONVOID RULES</h3>

    <p>Не создавай проблем другим пользователям.</p>
    <p>Разрешено всё, что не нарушает закон.</p>
    <p>Анонимность обязательна.</p>
    <p>Модерация окончательна.</p>

    <p><b>Запрещено:</b><br>
    - насилие<br>
    - доксинг<br>
    - спам</p>

  </div>`;
}

/* ===== LISTENER ===== */
function listen(id){

  const q=query(collection(db,"posts"));

  onSnapshot(q,(snap)=>{

    let html="";

    snap.forEach(d=>{
      let p=d.data();

      if(p.threadId===id){
        html+=`
        <div class="post">
          <b>${p.author}</b> #${p.id}<br>
          ${p.content||""}
          ${p.image?`<img src="${p.image}">`:""}
        </div>`;
      }
    });

    document.getElementById("replies").innerHTML=html;
  });
}

/* ===== RENDER SAFE ===== */
function render(){

  if(view==="rules") return rules();

  const q=query(collection(db,"threads"),orderBy("bumpedAt","desc"));

  onSnapshot(q,(snap)=>{

    let html=`<h3>${currentBoard.toUpperCase()}</h3>`;

    snap.forEach(d=>{
      let t=d.data();

      if(t.board===currentBoard){
        html+=`
        <div class="post">
          <a onclick="openThread('${d.id}','${t.title}','${t.content}')">
            <b>${t.title}</b>
          </a><br>
          ${t.content}
        </div>`;
      }
    });

    document.getElementById("app").innerHTML=html;
  });
}

render();
</script>

</body>
</html>
