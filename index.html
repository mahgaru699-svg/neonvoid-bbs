<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEONVOID.BBS v13</title>

<style>
body{
  font-family: Arial;
  background:#eef2ff;
  margin:20px;
}

.header{
  text-align:center;
}

.header img{
  max-width:420px;
  width:100%;
}

.post{
  border:1px solid #ccc;
  background:#fff;
  padding:8px;
  margin:6px 0;
  word-break: break-word;
}

textarea{width:100%;height:90px;}

button{cursor:pointer;margin:4px 0;}

img.postimg{max-width:200px;display:block;margin-top:5px;}

.small{
  font-size:12px;
  opacity:0.6;
}

.replyref{
  color:#00f;
  cursor:pointer;
}

.report{
  color:red;
  cursor:pointer;
  font-size:12px;
}

.locked{
  background:#ffecec;
  border:1px solid red;
}

.footer{
  text-align:center;
  margin-top:60px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://i.ibb.co/Q3XDDHYB/Chat-GPT-Image-22-2026-04-20-35-1.png">
</div>

<button onclick="newThread()">New Thread</button>

<div id="app"></div>

<div class="footer">NEONVOID v13</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  updateDoc,
  doc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtTTArBPBNHmZZJSytqjaRwA3nXvANBV0",
  authDomain: "neonevvvoid.firebaseapp.com",
  projectId: "neonevvvoid",
  storageBucket: "neonevvvoid.firebasestorage.app",
  messagingSenderId: "795809430469",
  appId: "1:795809430469:web:21f76f22dee7f7c14329ac"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* ===== STATE ===== */
let state = { thread:null };
let unsub=null;

/* ===== USER ===== */
function user(){
  let id=localStorage.getItem("id");
  if(!id){
    id="anon"+Math.floor(Math.random()*99999);
    localStorage.setItem("id",id);
  }
  return id;
}

/* ===== THREAD CREATE ===== */
window.newThread = async function(){

  let t=prompt("Title:");
  let c=prompt("Text:");
  if(!t||!c) return;

  await addDoc(collection(db,"threads"),{
    title:t,
    content:c,
    board:"main",
    createdAt:Date.now(),
    locked:false
  });
};

/* ===== OPEN THREAD ===== */
window.openThread = function(id,t,c){

  state.thread=id;

  document.getElementById("app").innerHTML=`
    <h3>${t}</h3>
    <div class="post">${c}</div>

    <textarea id="txt"></textarea>
    <input type="file" id="img">

    <button onclick="reply()">Reply</button>

    <div id="posts"></div>
  `;

  listen(id);
};

/* ===== REPLY ===== */
window.reply = async function(){

  let txt=document.getElementById("txt").value;
  let file=document.getElementById("img").files[0];

  let img=null;

  if(file){
    let r=ref(storage,"img/"+Date.now()+file.name);
    await uploadBytes(r,file);
    img=await getDownloadURL(r);
  }

  await addDoc(collection(db,"posts"),{
    threadId:state.thread,
    content:txt,
    author:user(),
    image:img,
    id:Date.now(),
    reports:0
  });

  await updateDoc(doc(db,"threads",state.thread),{
    bumpedAt:Date.now()
  });
};

/* ===== REPORT ===== */
window.reportPost = async function(postId){
  alert("reported: "+postId);
};

/* ===== LISTENER (FIXED CORE) ===== */
function listen(id){

  if(unsub) unsub();

  const q=query(collection(db,"posts"),orderBy("id","asc"));

  unsub=onSnapshot(q,(snap)=>{

    let html="";

    snap.forEach(d=>{
      let p=d.data();

      if(p.threadId===id){

        let text=p.content||"";

        /* >>reply parsing */
        text = text.replace(/>>(\d+)/g,
          `<span class="replyref">>>$1</span>`
        );

        html+=`
        <div class="post">
          <div class="small">${p.author} #${p.id}</div>

          ${text}

          ${p.image?`<img class="postimg" src="${p.image}">`:""}

          <div class="report" onclick="reportPost('${d.id}')">report</div>
        </div>`;
      }
    });

    document.getElementById("posts").innerHTML=html;
  });
}

</script>

</body>
</html>
