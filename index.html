<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEONVOID.BBS v7</title>

<style>
body{
  font-family: Arial;
  background:#2f3b2f;
  margin:20px;
  color:#e6f2e6;
}

/* HEADER */
h2{
  color:#9acd32;
}

/* LINKS */
a{
  color:#b6ff8a;
  cursor:pointer;
  text-decoration: underline;
}

/* THREAD / POSTS */
.post{
  border:1px solid #556b2f;
  background:#3f4f3f;
  padding:8px;
  margin:8px 0;
}

/* TEXTAREA */
textarea{
  width:100%;
  height:100px;
  border:1px solid #556b2f;
  background:#1f2a1f;
  color:#e6f2e6;
}

/* BUTTONS */
button{
  margin:5px 0;
  background:#556b2f;
  border:1px solid #9acd32;
  color:#fff;
  cursor:pointer;
}

button:hover{
  background:#6b8e23;
}

/* ADMIN */
.admin{
  border:2px solid #9acd32;
  padding:10px;
  background:#1f2a1f;
}

/* IMAGE */
img{
  max-width:250px;
  display:block;
  margin-top:5px;
  border:1px solid #556b2f;
}

/* QUOTES */
.quote{
  color:#9acd32;
}
</style>
</head>

<body>

<h2>NEONVOID.BBS v7 // HAKI OPS</h2>

<div>
  <a onclick="board('frontline')">Frontline Ops</a> |
  <a onclick="board('intel')">Intel / Tech</a> |
  <a onclick="board('field')">Field Reports</a> |
  <a onclick="board('logs')">War Logs</a> |
  <a onclick="board('art')">Green Art</a>
</div>

<hr>

<button onclick="newThread()">New Thread</button>
<button onclick="adminPanel()">Admin</button>

<div id="forum"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  updateDoc,
  doc,
  deleteDoc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtTTArBPBNHmZZJSytqjaRwA3nXvANBV0",
  authDomain: "neonevvvoid.firebaseapp.com",
  projectId: "neonevvvoid",
  storageBucket: "neonevvvoid.firebasestorage.app",
  messagingSenderId: "795809430469",
  appId: "1:795809430469:web:21f76f22dee7f7c14329ac"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let currentBoard = "frontline";
let currentThreadId = null;
let lastPost = 0;

/* ===== ANON ===== */
function getAnon(){
  let id = localStorage.getItem("anon");
  if(!id){
    id = "Unit#" + Math.floor(Math.random()*9000+1000);
    localStorage.setItem("anon", id);
  }
  return id;
}

/* ===== SPAM ===== */
function spam(){
  let now = Date.now();
  if(now - lastPost < 2000) return false;
  lastPost = now;
  return true;
}

/* ===== BOARDS ===== */
window.board = function(name){
  currentBoard = name;
  render();
};

/* ===== THREAD ===== */
window.newThread = async function(){
  if(!spam()) return;

  let t = prompt("Mission title:");
  if(!t) return;

  let c = prompt("Report:");
  if(!c) return;

  await addDoc(collection(db,"threads"),{
    title:t,
    content:c,
    board:currentBoard,
    createdAt:Date.now(),
    bumpedAt:Date.now(),
    sticky:false
  });
};

/* ===== OPEN THREAD ===== */
window.openThread = function(id,title,content){
  currentThreadId = id;

  document.getElementById("forum").innerHTML = `
    <h3>${title}</h3>
    <div class="post">${content}</div>

    <hr>

    <textarea id="txt"></textarea>
    <input type="file" id="img">
    <button onclick="reply()">Send</button>

    <div id="replies"></div>
  `;

  listenReplies(id);
};

/* ===== REPLY ===== */
window.reply = async function(){

  if(!spam()) return;

  let txt = document.getElementById("txt").value;
  let file = document.getElementById("img").files[0];

  let imgUrl = null;

  if(file){
    let r = ref(storage,"img/"+Date.now()+file.name);
    await uploadBytes(r,file);
    imgUrl = await getDownloadURL(r);
  }

  await addDoc(collection(db,"posts"),{
    threadId:currentThreadId,
    content:txt,
    author:getAnon(),
    id:Date.now(),
    image:imgUrl
  });

  await updateDoc(doc(db,"threads",currentThreadId),{
    bumpedAt:Date.now()
  });
};

/* ===== QUOTES ===== */
function parse(t){
  return (t||"").replace(/>>(\d+)/g,'<span class="quote">>>$1</span>');
}

/* ===== REALTIME POSTS ===== */
function listenReplies(id){

  const q = query(collection(db,"posts"));

  onSnapshot(q,(snap)=>{
    let html="";

    snap.forEach(d=>{
      let p=d.data();

      if(p.threadId===id){
        html+=`
        <div class="post">
          <b>${p.author}</b> #${p.id}<br>
          ${parse(p.content)}
          ${p.image?`<img src="${p.image}">`:""}
        </div>`;
      }
    });

    document.getElementById("replies").innerHTML=html;
  });
}

/* ===== ADMIN ===== */
window.adminPanel = function(){

  let pass = prompt("Admin key:");
  if(pass!=="admin123") return;

  document.getElementById("forum").innerHTML=`
    <div class="admin">
      <h3>COMMAND CENTER</h3>
      <button onclick="loadAll()">All Threads</button>
    </div>
    <div id="adm"></div>
  `;
};

/* ===== RENDER (REALTIME THREADS) ===== */
function render(){

  const q = query(collection(db,"threads"),orderBy("bumpedAt","desc"));

  onSnapshot(q,(snap)=>{

    let html=`<h3>${currentBoard.toUpperCase()}</h3>`;

    snap.forEach(d=>{
      let t=d.data();

      if(t.board===currentBoard){

        html+=`
        <div class="post">
          <a onclick="openThread('${d.id}','${t.title}','${t.content}')">
            <b>${t.title}</b>
          </a><br>
          ${t.content}
        </div>`;
      }
    });

    document.getElementById("forum").innerHTML=html;
  });
}

render();
</script>

</body>
</html>
