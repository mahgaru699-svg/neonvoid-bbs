<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEONVOID v16</title>

<style>
body{
  font-family: Arial;
  background:#eef2ff;
  margin:20px;
}

.header{
  text-align:center;
}

.header img{
  max-width:420px;
  width:100%;
}

.nav a{
  color:#00f;
  margin-right:10px;
  cursor:pointer;
  text-decoration: underline;
}

.post{
  border:1px solid #ccc;
  background:#fff;
  padding:8px;
  margin:6px 0;
  word-break: break-word;
}

textarea{
  width:100%;
  height:90px;
}

button{
  margin:5px 0;
  cursor:pointer;
}

img.postimg{
  max-width:220px;
  display:block;
  margin-top:5px;
}

.small{
  font-size:12px;
  opacity:0.6;
}

.reportBtn{
  color:red;
  cursor:pointer;
  font-size:12px;
}

.adminPanel{
  border:2px solid red;
  padding:10px;
  background:#fff0f0;
  margin-top:10px;
}

.footer{
  text-align:center;
  margin-top:60px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://i.ibb.co/Q3XDDHYB/Chat-GPT-Image-22-2026-04-20-35-1.png">
</div>

<div class="nav">
  <a onclick="showForum()">Forum</a>
  <a onclick="showRules()">Rules</a>
  <a onclick="openAdmin()">Admin</a>
</div>

<button onclick="newThread()">New Thread</button>

<div id="app"></div>

<div class="footer">NEONVOID v16 ADMIN</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

/* ===== FIREBASE ===== */
const firebaseConfig = {
  apiKey: "AIzaSyAtTTArBPBNHmZZJSytqjaRwA3nXvANBV0",
  authDomain: "neonevvvoid.firebaseapp.com",
  projectId: "neonevvvoid",
  storageBucket: "neonevvvoid.firebasestorage.app",
  messagingSenderId: "795809430469",
  appId: "1:795809430469:web:21f76f22dee7f7c14329ac"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* ===== STATE ===== */
let currentThread = null;
let postsCache = [];
let reportsCache = [];

/* ===== USER ===== */
function user(){
  let id = localStorage.getItem("id");
  if(!id){
    id="anon-"+Math.floor(Math.random()*99999);
    localStorage.setItem("id",id);
  }
  return id;
}

/* ===== ADMIN KEY ===== */
function isAdmin(){
  return localStorage.getItem("admin") === "1";
}

/* ===== LISTEN POSTS ===== */
const qPosts = query(collection(db,"posts"),orderBy("id","asc"));
onSnapshot(qPosts,(snap)=>{
  postsCache = snap.docs.map(d=>({id:d.id,...d.data()}));
  if(currentThread) renderPosts();
});

/* ===== LISTEN REPORTS ===== */
const qReports = query(collection(db,"reports"));
onSnapshot(qReports,(snap)=>{
  reportsCache = snap.docs.map(d=>({id:d.id,...d.data()}));
});

/* ===== NAV ===== */
window.showForum = function(){
  location.reload();
};

window.showRules = function(){
  document.getElementById("app").innerHTML = `
    <div class="post">
      <h3>RULES</h3>
      <p>Не спамить</p>
      <p>Не доксить</p>
      <p>Анонимность обязательна</p>
    </div>
  `;
};

/* ===== THREAD ===== */
window.newThread = async function(){

  let t=prompt("Title:");
  let c=prompt("Text:");
  if(!t||!c) return;

  await addDoc(collection(db,"threads"),{
    title:t,
    content:c,
    createdAt:Date.now()
  });
};

/* ===== OPEN THREAD ===== */
window.openThread = function(id,t,c){

  currentThread = id;

  document.getElementById("app").innerHTML = `
    <h3>${t}</h3>
    <div class="post">${c}</div>

    <textarea id="txt"></textarea>
    <input type="file" id="img">

    <button onclick="reply()">Reply</button>

    <div id="posts"></div>
  `;

  renderPosts();
};

/* ===== REPLY ===== */
window.reply = async function(){

  let txt=document.getElementById("txt").value;
  let file=document.getElementById("img").files[0];

  let img=null;

  if(file){
    let r=ref(storage,"img/"+Date.now()+file.name);
    await uploadBytes(r,file);
    img=await getDownloadURL(r);
  }

  await addDoc(collection(db,"posts"),{
    threadId:currentThread,
    content:txt,
    author:user(),
    image:img,
    id:Date.now(),
    deleted:false
  });
};

/* ===== REPORT POST ===== */
window.reportPost = async function(postId){

  await addDoc(collection(db,"reports"),{
    postId:postId,
    time:Date.now()
  });

  alert("Reported");
};

/* ===== ADMIN PANEL ===== */
window.openAdmin = function(){

  if(!isAdmin()){
    let key = prompt("Admin key:");
    if(key==="1234"){
      localStorage.setItem("admin","1");
      alert("Admin enabled");
    } else {
      alert("wrong key");
      return;
    }
  }

  let html = `<div class="adminPanel"><h3>ADMIN PANEL</h3>`;

  html += `<h4>Reports</h4>`;

  for(let r of reportsCache){
    html += `
      <div class="post">
        PostID: ${r.postId}
      </div>
    `;
  }

  html += `</div>`;

  document.getElementById("app").innerHTML = html;
};

/* ===== POSTS RENDER ===== */
function renderPosts(){

  let html="";

  for(let p of postsCache){

    if(p.threadId === currentThread){

      html += `
      <div class="post">
        <div class="small">${p.author}</div>
        ${p.content || ""}
        ${p.image ? `<img class="postimg" src="${p.image}">` : ""}
        <div class="reportBtn" onclick="reportPost('${p.id}')">report</div>
      </div>`;
    }
  }

  document.getElementById("posts").innerHTML = html;
}

</script>

</body>
</html>
