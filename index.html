<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEONVOID.BBS v4</title>

<style>
body{
  font-family: Arial;
  background:#eee;
  margin:20px;
}

.post{
  border:1px solid #000;
  background:#fff;
  padding:8px;
  margin:8px 0;
}

a{
  color:blue;
  cursor:pointer;
  text-decoration: underline;
}

textarea{
  width:100%;
  height:100px;
}

button{
  margin:5px 0;
}

.admin{
  border:2px solid red;
  padding:10px;
  background:#fff;
}
</style>
</head>

<body>

<h2>NEONVOID.BBS v4</h2>

<div>
  <a onclick="board('b')">/b/</a> |
  <a onclick="board('tech')">/tech/</a> |
  <a onclick="board('random')">/random/</a>
</div>

<hr>

<button onclick="newThread()">Новый тред</button>
<button onclick="adminPanel()">Админка</button>

<div id="forum"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy,
  updateDoc,
  doc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtTTArBPBNHmZZJSytqjaRwA3nXvANBV0",
  authDomain: "neonevvvoid.firebaseapp.com",
  projectId: "neonevvvoid",
  storageBucket: "neonevvvoid.firebasestorage.app",
  messagingSenderId: "795809430469",
  appId: "1:795809430469:web:21f76f22dee7f7c14329ac"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentBoard = "b";
let currentThreadId = null;
let lastPostTime = 0;

/* ===== ANON ID ===== */
function getAnonId(){
  let id = localStorage.getItem("anonId");
  if(!id){
    id = "Anon#" + Math.floor(Math.random()*9000+1000);
    localStorage.setItem("anonId", id);
  }
  return id;
}

/* ===== SPAM PROTECTION ===== */
function spamCheck(){
  let now = Date.now();
  if(now - lastPostTime < 2000){
    alert("Слишком быстро");
    return false;
  }
  lastPostTime = now;
  return true;
}

/* ===== BOARDS ===== */
window.board = function(name){
  currentBoard = name;
  render();
};

/* ===== CREATE THREAD ===== */
window.newThread = async function(){

  if(!spamCheck()) return;

  let title = prompt("Название:");
  if(!title) return;

  let text = prompt("Текст:");
  if(!text) return;

  await addDoc(collection(db, "threads"), {
    title,
    content: text,
    board: currentBoard,
    createdAt: Date.now(),
    bumpedAt: Date.now()
  });

  render();
};

/* ===== OPEN THREAD ===== */
window.openThread = async function(id, title, content){

  currentThreadId = id;

  document.getElementById("forum").innerHTML = `
    <h3>${title}</h3>
    <div class="post">${content}</div>

    <hr>

    <textarea id="replyText"></textarea>
    <button onclick="sendReply()">Ответить</button>

    <div id="replies"></div>
  `;

  loadReplies(id);
};

/* ===== SEND REPLY + BUMP ===== */
window.sendReply = async function(){

  if(!spamCheck()) return;

  let txt = document.getElementById("replyText").value;
  if(!txt) return;

  await addDoc(collection(db, "posts"), {
    threadId: currentThreadId,
    content: txt,
    author: getAnonId(),
    postId: Date.now(),
    createdAt: Date.now()
  });

  // 🔥 BUMP THREAD
  await updateDoc(doc(db, "threads", currentThreadId), {
    bumpedAt: Date.now()
  });

  loadReplies(currentThreadId);
};

/* ===== PARSE QUOTES ===== */
function parseQuotes(text){
  return text.replace(/>>(\d+)/g, '<span style="color:green">>>$1</span>');
}

/* ===== LOAD REPLIES ===== */
window.loadReplies = async function(threadId){

  const snap = await getDocs(collection(db, "posts"));

  let html = "";

  snap.forEach(d=>{
    let p = d.data();

    if(p.threadId === threadId){
      html += `
        <div class="post">
          <b>${p.author}</b> #${p.postId}<br>
          ${parseQuotes(p.content)}
        </div>
      `;
    }
  });

  document.getElementById("replies").innerHTML = html;
};

/* ===== ADMIN ===== */
window.adminPanel = function(){

  let pass = prompt("Admin password:");
  if(pass !== "admin123"){
    alert("Wrong");
    return;
  }

  document.getElementById("forum").innerHTML = `
    <div class="admin">
      <h3>ADMIN</h3>
      <button onclick="loadAll()">Все треды</button>
    </div>
    <div id="adminArea"></div>
  `;
};

/* ===== LOAD ALL THREADS ===== */
window.loadAll = async function(){

  const snap = await getDocs(collection(db, "threads"));

  let html = "";

  snap.forEach(d=>{
    let t = d.data();

    html += `
      <div class="post">
        <b>${t.title}</b><br>
        ${t.content}<br>
        <button onclick="deleteThread('${d.id}')">DELETE</button>
      </div>
    `;
  });

  document.getElementById("adminArea").innerHTML = html;
};

/* ===== DELETE THREAD ===== */
window.deleteThread = async function(id){
  await deleteDoc(doc(db, "threads", id));
  loadAll();
};

/* ===== RENDER (BUMP ORDER) ===== */
async function render(){

  let html = `<h3>/${currentBoard}/</h3>`;

  const q = query(collection(db, "threads"), orderBy("bumpedAt","desc"));
  const snap = await getDocs(q);

  snap.forEach(d=>{
    let t = d.data();

    if(t.board === currentBoard){
      html += `
        <div class="post">
          <a onclick="openThread('${d.id}','${t.title}','${t.content}')">
            <b>${t.title}</b>
          </a><br>
          ${t.content}
        </div>
      `;
    }
  });

  document.getElementById("forum").innerHTML = html;
}

/* ===== AUTO REFRESH (LIGHT REALTIME) ===== */
setInterval(render, 5000);

render();
</script>

</body>
</html>
