<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEONVOID.BBS v10</title>

<style>
body{
  font-family: Arial;
  background:#eef2ff;
  margin:20px;
  color:#000;
}

.header{
  text-align:center;
  margin-bottom:10px;
}

.header img{
  max-width:420px;
  width:100%;
  display:block;
  margin:0 auto;
}

.nav a{
  color:#00f;
  margin:0 6px;
  cursor:pointer;
  text-decoration: underline;
  font-size:14px;
}

.post{
  border:1px solid #ccc;
  background:#f9f9f9;
  padding:8px;
  margin:8px 0;
}

textarea{
  width:100%;
  height:90px;
}

button{
  margin:5px 0;
  cursor:pointer;
}

img.postimg{
  max-width:200px;
  display:block;
  margin-top:5px;
}

.hidden{
  display:none;
}

.replybox{
  margin-top:10px;
}

.deleted{
  opacity:0.5;
  font-style:italic;
}

.rules{
  white-space:pre-wrap;
  background:#fff;
  padding:10px;
  border:1px solid #ccc;
}

.footer{
  text-align:center;
  margin-top:60px;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://i.ibb.co/xtYZ6sjK/Chat-GPT-Image-22-2026-04-20-35.png">
</div>

<div class="nav">
  <a onclick="go('forum')">Forum</a>
  <a onclick="go('rules')">Rules</a>
  <a onclick="board('frontline')">Frontline</a>
  <a onclick="board('intel')">Intel</a>
</div>

<button onclick="newThread()">New Thread</button>

<div id="app"></div>

<div class="footer">
Created in 2026 — For you with soul
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  updateDoc,
  doc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtTTArBPBNHmZZJSytqjaRwA3nXvANBV0",
  authDomain: "neonevvvoid.firebaseapp.com",
  projectId: "neonevvvoid",
  storageBucket: "neonevvvoid.firebasestorage.app",
  messagingSenderId: "795809430469",
  appId: "1:795809430469:web:21f76f22dee7f7c14329ac"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* ===== STATE ===== */
let state = {
  view:"forum",
  board:"frontline",
  thread:null
};

let unsub = null;

/* ===== USER ===== */
function user(){
  let id = localStorage.getItem("id");
  if(!id){
    id = "anon-" + Math.floor(Math.random()*9999);
    localStorage.setItem("id", id);
  }
  return id;
}

/* ===== NAV ===== */
window.go = function(v){
  state.view=v;
  render();
};

window.board = function(b){
  state.board=b;
  state.view="forum";
  render();
};

/* ===== THREAD ===== */
window.newThread = async function(){

  let t = prompt("Title:");
  let c = prompt("Text:");
  if(!t || !c) return;

  await addDoc(collection(db,"threads"),{
    title:t,
    content:c,
    board:state.board,
    createdAt:Date.now(),
    deleted:false
  });
};

/* ===== OPEN THREAD ===== */
window.openThread = function(id,t,c){

  state.thread=id;
  state.view="thread";

  document.getElementById("app").innerHTML=`
    <h3>${t}</h3>
    <div class="post">${c}</div>

    <textarea id="txt"></textarea>
    <input type="file" id="img">

    <button onclick="reply()">Reply</button>

    <div id="posts"></div>
  `;

  listen(id);
};

/* ===== REPLY (FIXED IMAGE BUG) ===== */
window.reply = async function(){

  let txt = document.getElementById("txt").value;
  let file = document.getElementById("img").files[0];

  let img = null;

  if(file){
    let r = ref(storage,"img/"+Date.now()+file.name);
    await uploadBytes(r,file);
    img = await getDownloadURL(r);
  }

  await addDoc(collection(db,"posts"),{
    threadId:state.thread,
    content:txt,
    image:img,
    author:user(),
    deleted:false
  });

  document.getElementById("txt").value="";
  document.getElementById("img").value="";
};

/* ===== DELETE POST (SOFT) ===== */
window.delPost = async function(idRef){

  await updateDoc(doc(db,"posts",idRef),{
    deleted:true
  });
};

/* ===== RESTORE POST ===== */
window.restorePost = async function(idRef){

  await updateDoc(doc(db,"posts",idRef),{
    deleted:false
  });
};

/* ===== RULES (FULL INSERTED) ===== */
function rules(){
  document.getElementById("app").innerHTML=`
  <div class="rules">
Правила форума NEONVOID

Основное правило
Не создавай проблем другим пользователям. Если твой пост, тред или поведение мешает нормальному обсуждению или провоцирует бессмысленные конфликты — он может быть удалён, а ты — получить предупреждение или бан.

Свобода контента
На форуме разрешено практически всё, что не нарушает законодательство Российской Федерации. Политические, спорные и провокационные темы допускаются.

Анонимность
Уважай анонимность других пользователей. Не пытайся выяснять реальную личность анона, не требуй личных данных и не устраивай допросы.

Отношение к модерации
Решения модераторов окончательны.

Запрещено:
- насилие
- терроризм
- доксинг
- спам

Добро пожаловать на NEONVOID
  </div>`;
}

/* ===== LISTENER FIX ===== */
function listen(id){

  if(unsub) unsub();

  const q = query(collection(db,"posts"));

  unsub = onSnapshot(q,(snap)=>{

    let html="";

    snap.forEach(d=>{
      let p=d.data();

      if(p.threadId===id){

        if(p.deleted){
          html+=`
          <div class="post deleted">
            [deleted]
            <button onclick="restorePost('${d.id}')">restore</button>
          </div>`;
        }else{
          html+=`
          <div class="post">
            <b>${p.author}</b><br>
            ${p.content||""}
            ${p.image?`<img class="postimg" src="${p.image}">`:""}

            <br>
            <button onclick="delPost('${d.id}')">delete</button>
          </div>`;
        }
      }
    });

    document.getElementById("posts").innerHTML=html;
  });
}

/* ===== RENDER SAFE ===== */
function render(){

  if(state.view==="rules") return rules();

  const q = query(collection(db,"threads"),orderBy("createdAt","desc"));

  onSnapshot(q,(snap)=>{

    let html=`<h3>${state.board}</h3>`;

    snap.forEach(d=>{
      let t=d.data();

      if(t.board===state.board){
        html+=`
        <div class="post">
          <a onclick="openThread('${d.id}','${t.title}','${t.content}')">
            <b>${t.title}</b>
          </a><br>
          ${t.content}
        </div>`;
      }
    });

    document.getElementById("app").innerHTML=html;
  });
}

render();
</script>

</body>
</html>
