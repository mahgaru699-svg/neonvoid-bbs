<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEONVOID.BBS</title>

<style>
body{
  font-family: Arial;
  background:#eee;
  margin:20px;
}

.post{
  border:1px solid #000;
  background:#fff;
  padding:8px;
  margin:8px 0;
}

a{
  color:blue;
  cursor:pointer;
}

textarea{
  width:100%;
  height:100px;
}

button{
  margin:5px 0;
}
</style>
</head>

<body>

<h2>NEONVOID.BBS</h2>

<a onclick="board('b')">/b/</a> |
<a onclick="board('tech')">/tech/</a> |
<a onclick="board('random')">/random/</a>

<div>
  <button onclick="newThread()">Новый тред</button>
</div>

<div id="forum"></div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtTTArBPBNHmZZJSytqjaRwA3nXvANBV0",
  authDomain: "neonevvvoid.firebaseapp.com",
  projectId: "neonevvvoid",
  storageBucket: "neonevvvoid.firebasestorage.app",
  messagingSenderId: "795809430469",
  appId: "1:795809430469:web:21f76f22dee7f7c14329ac"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let current = "b";

// смена доски
window.board = function(name){
  current = name;
  render();
};

// создать тред (🔥 теперь Firebase)
window.newThread = async function(){
  let title = prompt("Название треда:");
  if(!title) return;

  let text = prompt("Текст поста:");
  if(!text) return;

  await addDoc(collection(db, "threads"), {
    title: title,
    content: text,
    board: current,
    createdAt: Date.now(),
    bumpedAt: Date.now()
  });

  render();
};

// загрузка тредов
async function render(){
  let html = "<h3>/"+current+"/</h3>";

  const snap = await getDocs(collection(db, "threads"));

  snap.forEach(doc=>{
    let t = doc.data();

    if(t.board === current){
      html += `
        <div class="post">
          <b>${t.title}</b><br>
          ${t.content}
        </div>
      `;
    }
  });

  document.getElementById("forum").innerHTML = html;
}

render();
</script>

</body>
</html>
