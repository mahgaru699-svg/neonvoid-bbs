<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEONVOID BBS v15</title>

<style>
body{
  font-family: Arial;
  background:#eef2ff;
  margin:20px;
  color:#000;
}

.header{
  text-align:center;
  margin-bottom:10px;
}

.header img{
  max-width:420px;
  width:100%;
}

.nav{
  margin:10px 0;
}

.nav a{
  color:#00f;
  margin-right:10px;
  cursor:pointer;
  text-decoration: underline;
}

.post{
  border:1px solid #ccc;
  background:#fff;
  padding:8px;
  margin:6px 0;
  word-break: break-word;
}

textarea{
  width:100%;
  height:90px;
}

button{
  margin:5px 0;
  cursor:pointer;
}

img.postimg{
  max-width:220px;
  display:block;
  margin-top:5px;
}

.replyref{
  color:blue;
  cursor:pointer;
}

.footer{
  text-align:center;
  margin-top:60px;
  opacity:0.6;
  font-size:12px;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://i.ibb.co/Q3XDDHYB/Chat-GPT-Image-22-2026-04-20-35-1.png">
</div>

<div class="nav">
  <a onclick="showForum()">Forum</a>
  <a onclick="showRules()">Rules</a>
</div>

<button onclick="newThread()">New Thread</button>

<div id="app"></div>

<div class="footer">
Created in 2026 — For you with soul
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

/* ===== FIREBASE ===== */
const firebaseConfig = {
  apiKey: "AIzaSyAtTTArBPBNHmZZJSytqjaRwA3nXvANBV0",
  authDomain: "neonevvvoid.firebaseapp.com",
  projectId: "neonevvvoid",
  storageBucket: "neonevvvoid.firebasestorage.app",
  messagingSenderId: "795809430469",
  appId: "1:795809430469:web:21f76f22dee7f7c14329ac"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* ===== STATE (STABLE CORE) ===== */
let currentThread = null;
let unsubThreads = null;
let unsubPosts = null;

/* ===== USER ID ===== */
function user(){
  let id = localStorage.getItem("id");
  if(!id){
    id = "anon-" + Math.floor(Math.random()*99999);
    localStorage.setItem("id",id);
  }
  return id;
}

/* ===== NAV ===== */
window.showForum = function(){
  renderForum();
};

window.showRules = function(){
  document.getElementById("app").innerHTML = `
    <div class="post">
      <h3>RULES</h3>
      <p>• Не мешай другим пользователям</p>
      <p>• Разрешено всё в рамках закона</p>
      <p>• Анонимность обязательна</p>
      <p>• Модерация имеет право удалять контент</p>
    </div>
  `;
};

/* ===== CREATE THREAD ===== */
window.newThread = async function(){

  let t = prompt("Title:");
  let c = prompt("Text:");
  if(!t || !c) return;

  await addDoc(collection(db,"threads"),{
    title:t,
    content:c,
    createdAt:Date.now()
  });
};

/* ===== OPEN THREAD ===== */
window.openThread = function(id,t,c){

  currentThread = id;

  document.getElementById("app").innerHTML = `
    <h3>${t}</h3>
    <div class="post">${c}</div>

    <textarea id="txt"></textarea>
    <input type="file" id="img">

    <button onclick="reply()">Reply</button>

    <div id="posts"></div>
  `;

  renderPosts();
};

/* ===== REPLY ===== */
window.reply = async function(){

  let txt = document.getElementById("txt").value;
  let file = document.getElementById("img").files[0];

  let img = null;

  if(file){
    let r = ref(storage,"img/"+Date.now()+file.name);
    await uploadBytes(r,file);
    img = await getDownloadURL(r);
  }

  await addDoc(collection(db,"posts"),{
    threadId: currentThread,
    content: txt,
    author: user(),
    image: img,
    id: Date.now()
  });

  document.getElementById("txt").value = "";
  document.getElementById("img").value = "";
};

/* ===== FORUM RENDER (SAFE) ===== */
function renderForum(){

  if(unsubThreads) unsubThreads();

  const q = query(collection(db,"threads"),orderBy("createdAt","desc"));

  unsubThreads = onSnapshot(q,(snap)=>{

    let html = "<h3>BOARD</h3>";

    snap.forEach(d=>{
      let t = d.data();

      html += `
      <div class="post">
        <a onclick="openThread('${d.id}','${t.title}','${t.content}')">
          <b>${t.title}</b>
        </a><br>
        ${t.content}
      </div>`;
    });

    document.getElementById("app").innerHTML = html;
  });
}

/* ===== POSTS RENDER ===== */
function renderPosts(){

  if(unsubPosts) unsubPosts();

  const q = query(collection(db,"posts"));

  unsubPosts = onSnapshot(q,(snap)=>{

    let html = "";

    snap.forEach(d=>{
      let p = d.data();

      if(p.threadId === currentThread){

        let text = p.content || "";

        text = text.replace(/>>(\d+)/g,
          `<span class="replyref">>>$1</span>`
        );

        html += `
        <div class="post">
          <b>${p.author}</b><br>
          ${text}
          ${p.image ? `<img class="postimg" src="${p.image}">` : ""}
        </div>`;
      }
    });

    document.getElementById("posts").innerHTML = html;
  });
}

/* ===== INIT ===== */
renderForum();

</script>

</body>
</html>
