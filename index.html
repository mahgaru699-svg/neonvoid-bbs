<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEONVOID.BBS v11</title>

<style>
body{
  font-family: Arial;
  background:#eef2ff;
  margin:20px;
  color:#000;
}

.header{
  text-align:center;
  margin-bottom:10px;
}

/* FIXED LOGO (no wrapper, no crop) */
.header img{
  max-width:420px;
  width:100%;
  height:auto;
  display:block;
  margin:0 auto;
  border:1px solid #ccc;
}

.nav a{
  color:#00f;
  margin:0 6px;
  cursor:pointer;
  text-decoration: underline;
}

.post{
  border:1px solid #ccc;
  background:#f9f9f9;
  padding:8px;
  margin:8px 0;
  word-break: break-word;
}

textarea{
  width:100%;
  height:90px;
}

button{
  margin:5px 0;
  cursor:pointer;
}

img.postimg{
  max-width:220px;
  display:block;
  margin-top:5px;
}

.deleted{
  opacity:0.5;
  font-style:italic;
}

.footer{
  text-align:center;
  margin-top:60px;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="header">

  <!-- 🖼️ FIXED LOGO (REAL IMAGE URL ONLY) -->
  <img src="https://i.ibb.co/Q3XDDHYB/Chat-GPT-Image-22-2026-04-20-35-1.png" alt="logo">

</div>

<div class="nav">
  <a onclick="go('forum')">Forum</a>
  <a onclick="go('rules')">Rules</a>
  <a onclick="board('frontline')">Frontline</a>
  <a onclick="board('intel')">Intel</a>
</div>

<button onclick="newThread()">New Thread</button>

<div id="app"></div>

<div class="footer">
Created in 2026 — For you with soul
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  updateDoc,
  doc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtTTArBPBNHmZZJSytqjaRwA3nXvANBV0",
  authDomain: "neonevvvoid.firebaseapp.com",
  projectId: "neonevvvoid",
  storageBucket: "neonevvvoid.firebasestorage.app",
  messagingSenderId: "795809430469",
  appId: "1:795809430469:web:21f76f22dee7f7c14329ac"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* ===== STATE SAFE ===== */
let state = {
  view:"forum",
  board:"frontline",
  thread:null
};

let unsubPosts = null;
let unsubThreads = null;

/* ===== USER ===== */
function user(){
  let id = localStorage.getItem("id");
  if(!id){
    id = "anon-" + Math.floor(Math.random()*9999);
    localStorage.setItem("id", id);
  }
  return id;
}

/* ===== NAV ===== */
window.go = function(v){
  state.view=v;
  render();
};

window.board = function(b){
  state.board=b;
  state.view="forum";
  render();
};

/* ===== THREAD CREATE (SAFE) ===== */
window.newThread = async function(){

  let t = prompt("Title:");
  let c = prompt("Text:");
  if(!t || !c) return;

  await addDoc(collection(db,"threads"),{
    title:t,
    content:c,
    board:state.board,
    createdAt:Date.now()
  });
};

/* ===== OPEN THREAD ===== */
window.openThread = function(id,t,c){

  state.thread=id;
  state.view="thread";

  document.getElementById("app").innerHTML=`
    <h3>${t}</h3>
    <div class="post">${c}</div>

    <textarea id="txt"></textarea>
    <input type="file" id="img">

    <button onclick="reply()">Reply</button>

    <div id="posts"></div>
  `;

  listenPosts(id);
};

/* ===== REPLY (FIXED IMAGE BUG FINAL) ===== */
window.reply = async function(){

  let txt = document.getElementById("txt").value;
  let file = document.getElementById("img").files[0];

  let img = null;

  try{

    if(file){
      let r = ref(storage,"img/"+Date.now()+file.name);
      await uploadBytes(r,file);
      img = await getDownloadURL(r);
    }

  }catch(e){
    alert("Image upload failed");
    return;
  }

  await addDoc(collection(db,"posts"),{
    threadId:state.thread,
    content:txt,
    author:user(),
    image:img,
    deleted:false
  });

  document.getElementById("txt").value="";
  document.getElementById("img").value="";
};

/* ===== RULES ===== */
function rules(){
  document.getElementById("app").innerHTML=`
  <div class="post">
  <h3>RULES</h3>

  Правила форума NEONVOID

  Основное правило:
  Не создавай проблем другим пользователям.

  Свобода контента:
  Разрешено всё, что не нарушает закон РФ.

  Анонимность:
  Не раскрывай личности.

  Модерация:
  Решения окончательны.

  Запрещено:
  - насилие
  - терроризм
  - доксинг
  - спам

  Добро пожаловать на NEONVOID
  </div>`;
}

/* ===== POSTS LISTENER (FIXED DUPLICATION) ===== */
function listenPosts(id){

  if(unsubPosts) unsubPosts();

  const q = query(collection(db,"posts"));

  unsubPosts = onSnapshot(q,(snap)=>{

    let html="";

    snap.forEach(d=>{
      let p=d.data();

      if(p.threadId===id){

        if(p.deleted){
          html+=`
          <div class="post deleted">
            [deleted]
          </div>`;
        }else{
          html+=`
          <div class="post">
            <b>${p.author}</b><br>
            ${p.content||""}
            ${p.image?`<img class="postimg" src="${p.image}">`:""}
          </div>`;
        }
      }
    });

    document.getElementById("posts").innerHTML=html;
  });
}

/* ===== RENDER SAFE (NO MULTI LISTEN) ===== */
function render(){

  if(state.view==="rules") return rules();

  if(unsubThreads) unsubThreads();

  const q = query(collection(db,"threads"),orderBy("createdAt","desc"));

  unsubThreads = onSnapshot(q,(snap)=>{

    let html = `<h3>${state.board}</h3>`;

    snap.forEach(d=>{
      let t = d.data();

      if(t.board === state.board){
        html += `
        <div class="post">
          <a onclick="openThread('${d.id}','${t.title}','${t.content}')">
            <b>${t.title}</b>
          </a><br>
          ${t.content}
        </div>`;
      }
    });

    document.getElementById("app").innerHTML = html;
  });
}

render();
</script>

</body>
</html>
