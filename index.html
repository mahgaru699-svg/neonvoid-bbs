<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEONVOID.BBS v8</title>

<style>
body{
  font-family: Arial;
  background:#2f3b2f;
  margin:20px;
  color:#e6f2e6;
}

h2{
  display:none;
}

.header{
  text-align:center;
  margin-bottom:10px;
}

.header img{
  max-width:360px;
  border:2px solid #556b2f;
  box-shadow:0 0 15px #000;
}

.nav a{
  color:#b6ff8a;
  margin:0 8px;
  cursor:pointer;
  text-decoration: underline;
}

.post{
  border:1px solid #556b2f;
  background:#3f4f3f;
  padding:8px;
  margin:8px 0;
}

textarea{
  width:100%;
  height:100px;
  background:#1f2a1f;
  color:#e6f2e6;
  border:1px solid #556b2f;
}

button{
  margin:5px 0;
  background:#556b2f;
  border:1px solid #9acd32;
  color:#fff;
  cursor:pointer;
}

button:hover{
  background:#6b8e23;
}

.admin{
  border:2px solid #9acd32;
  padding:10px;
  background:#1f2a1f;
}

img{
  max-width:250px;
  display:block;
  margin-top:5px;
  border:1px solid #556b2f;
}

.quote{
  color:#9acd32;
}

.gold{
  color:gold;
  font-weight:bold;
}

.crown{
  color:gold;
}
.footer{
  text-align:center;
  margin-top:20px;
  opacity:0.7;
  font-size:12px;
}
.rules{
  background:#1f2a1f;
  padding:10px;
  border:1px solid #556b2f;
}
</style>
</head>

<body>

<div class="header">
  <!-- ЛОГО -->
  <img src="https://ibb.co/xtYZ6sjK" alt="NEONVOID LOGO">
  <div class="nav">
    <a onclick="view='forum';render()">Forum</a>
    <a onclick="view='rules';renderRules()">Rules</a>
    <a onclick="board('frontline')">Frontline</a>
    <a onclick="board('intel')">Intel</a>
    <a onclick="board('field')">Field</a>
    <a onclick="board('art')">Art</a>
  </div>
</div>

<button onclick="newThread()">New Thread</button>
<button onclick="adminPanel()">Admin</button>

<div id="app"></div>

<div class="footer">
  Created in 2026 — For you with soul
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  updateDoc,
  doc,
  deleteDoc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtTTArBPBNHmZZJSytqjaRwA3nXvANBV0",
  authDomain: "neonevvvoid.firebaseapp.com",
  projectId: "neonevvvoid",
  storageBucket: "neonevvvoid.firebasestorage.app",
  messagingSenderId: "795809430469",
  appId: "1:795809430469:web:21f76f22dee7f7c14329ac"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let currentBoard = "frontline";
let currentThread = null;
let last = 0;
let view = "forum";

/* ===== ANON + OWNER ===== */
function getAnon(){
  let id = localStorage.getItem("anon");
  if(!id){
    id = "Unit#" + Math.floor(Math.random()*9000+1000);
    localStorage.setItem("anon", id);
  }

  // 👑 OWNER SET (первый пользователь = ты)
  if(!localStorage.getItem("owner")){
    localStorage.setItem("owner", id);
  }

  return id;
}

function isOwner(id){
  return localStorage.getItem("owner") === id;
}

/* ===== SPAM ===== */
function spam(){
  let now = Date.now();
  if(now-last<2000) return false;
  last=now;
  return true;
}

/* ===== BOARDS ===== */
window.board = function(b){
  currentBoard=b;
  view="forum";
  render();
};

/* ===== THREAD ===== */
window.newThread = async function(){

  if(!spam()) return;

  let t = prompt("Title:");
  let c = prompt("Text:");
  if(!t||!c) return;

  await addDoc(collection(db,"threads"),{
    title:t,
    content:c,
    board:currentBoard,
    createdAt:Date.now(),
    bumpedAt:Date.now()
  });
};

/* ===== OPEN ===== */
window.openThread = function(id,t,c){

  currentThread=id;

  document.getElementById("app").innerHTML=`
    <h3>${t}</h3>
    <div class="post">${c}</div>

    <textarea id="txt"></textarea>
    <input type="file" id="img">
    <button onclick="reply()">Send</button>

    <div id="replies"></div>
  `;

  listen(id);
};

/* ===== REPLY ===== */
window.reply = async function(){

  if(!spam()) return;

  let txt=document.getElementById("txt").value;
  let file=document.getElementById("img").files[0];

  let img=null;

  if(file){
    let r=ref(storage,"img/"+Date.now()+file.name);
    await uploadBytes(r,file);
    img=await getDownloadURL(r);
  }

  await addDoc(collection(db,"posts"),{
    threadId:currentThread,
    content:txt,
    author:getAnon(),
    image:img,
    id:Date.now()
  });

  await updateDoc(doc(db,"threads",currentThread),{
    bumpedAt:Date.now()
  });
};

/* ===== QUOTES ===== */
function parse(t){
  return (t||"").replace(/>>(\d+)/g,'<span class="quote">>>$1</span>');
}

/* ===== REALTIME POSTS ===== */
function listen(id){

  const q=query(collection(db,"posts"));

  onSnapshot(q,(snap)=>{

    let html="";

    snap.forEach(d=>{
      let p=d.data();

      if(p.threadId===id){

        let nameClass = isOwner(p.author) ? "gold" : "";
        let crown = isOwner(p.author) ? "👑" : "";

        html+=`
        <div class="post">
          <span class="${nameClass}">
            ${crown} ${p.author}
          </span> #${p.id}<br>

          ${parse(p.content)}
          ${p.image?`<img src="${p.image}">`:""}
        </div>`;
      }
    });

    document.getElementById("replies").innerHTML=html;
  });
}

/* ===== ADMIN ===== */
window.adminPanel = function(){

  let pass=prompt("Admin:");
  if(pass!=="admin123") return;

  alert("OK ADMIN MODE");
};

/* ===== RULES ===== */
function renderRules(){

  document.getElementById("app").innerHTML=`
  <div class="rules">

  <h3>Rules of NEONVOID</h3>

  <p><b>Основное правило:</b><br>
  Не создавай проблем другим пользователям.</p>

  <p><b>Свобода контента:</b><br>
  Разрешено всё, что не нарушает законы РФ.</p>

  <p><b>Анонимность:</b><br>
  Не пытайся раскрывать личности анонов.</p>

  <p><b>Модерация:</b><br>
  Решения модераторов окончательны.</p>

  <p><b>Запрещено:</b><br>
  - насилие<br>
  - доксинг<br>
  - спам<br>
  - незаконный контент</p>

  <p><b>Простыми словами:</b><br>
  веди себя нормально, не ломай атмосферу.</p>

  </div>`;
}

/* ===== RENDER ===== */
function render(){

  if(view==="rules") return renderRules();

  const q=query(collection(db,"threads"),orderBy("bumpedAt","desc"));

  onSnapshot(q,(snap)=>{

    let html=`<h3>${currentBoard.toUpperCase()}</h3>`;

    snap.forEach(d=>{
      let t=d.data();

      if(t.board===currentBoard){
        html+=`
        <div class="post">
          <a onclick="openThread('${d.id}','${t.title}','${t.content}')">
            <b>${t.title}</b>
          </a><br>
          ${t.content}
        </div>`;
      }
    });

    document.getElementById("app").innerHTML=html;
  });
}

render();
</script>

</body>
</html>
