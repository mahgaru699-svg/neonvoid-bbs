<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEONVOID.BBS SAFE</title>

<style>
body{
  font-family: Arial;
  background:#eef2ff;
  margin:20px;
}

.header{
  text-align:center;
}

.header img{
  max-width:420px;
  width:100%;
}

.nav a{
  color:#00f;
  margin:0 6px;
  cursor:pointer;
  text-decoration: underline;
}

.post{
  border:1px solid #ccc;
  background:#fff;
  padding:8px;
  margin:6px 0;
}

textarea{
  width:100%;
  height:90px;
}

button{margin:4px 0;cursor:pointer;}

img.postimg{
  max-width:220px;
  display:block;
  margin-top:5px;
}

.footer{
  text-align:center;
  margin-top:60px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://i.ibb.co/Q3XDDHYB/Chat-GPT-Image-22-2026-04-20-35-1.png">
</div>

<div class="nav">
  <a onclick="goForum()">Forum</a>
  <a onclick="goRules()">Rules</a>
</div>

<button onclick="newThread()">New Thread</button>

<div id="app"></div>

<div class="footer">NEONVOID SAFE MODE</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtTTArBPBNHmZZJSytqjaRwA3nXvANBV0",
  authDomain: "neonevvvoid.firebaseapp.com",
  projectId: "neonevvvoid",
  storageBucket: "neonevvvoid.firebasestorage.app",
  messagingSenderId: "795809430469",
  appId: "1:795809430469:web:21f76f22dee7f7c14329ac"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* ===== SAFE STATE ===== */
let currentThread = null;
let unsub = null;

/* ===== USER ===== */
function user(){
  let id = localStorage.getItem("id");
  if(!id){
    id="anon"+Math.floor(Math.random()*9999);
    localStorage.setItem("id",id);
  }
  return id;
}

/* ===== NAV SAFE ===== */
window.goForum = function(){
  renderForum();
};

window.goRules = function(){
  document.getElementById("app").innerHTML=`
    <div class="post">
      <h3>Rules</h3>
      <p>Не создавай проблем другим пользователям.</p>
      <p>Разрешено всё в рамках закона.</p>
      <p>Анонимность обязательна.</p>
    </div>`;
};

/* ===== THREAD ===== */
window.newThread = async function(){

  let t=prompt("Title:");
  let c=prompt("Text:");
  if(!t||!c) return;

  await addDoc(collection(db,"threads"),{
    title:t,
    content:c,
    createdAt:Date.now()
  });
};

/* ===== OPEN THREAD ===== */
window.openThread = function(id,t,c){

  currentThread=id;

  document.getElementById("app").innerHTML=`
    <h3>${t}</h3>
    <div class="post">${c}</div>

    <textarea id="txt"></textarea>
    <input type="file" id="img">
    <button onclick="reply()">Reply</button>

    <div id="posts"></div>
  `;

  listenPosts(id);
};

/* ===== REPLY SAFE ===== */
window.reply = async function(){

  let txt=document.getElementById("txt").value;
  let file=document.getElementById("img").files[0];

  let img=null;

  if(file){
    let r=ref(storage,"img/"+Date.now()+file.name);
    await uploadBytes(r,file);
    img=await getDownloadURL(r);
  }

  await addDoc(collection(db,"posts"),{
    threadId:currentThread,
    content:txt,
    author:user(),
    image:img
  });
};

/* ===== LISTENER SAFE ===== */
function listenPosts(id){

  if(unsub) unsub();

  const q=query(collection(db,"posts"));

  unsub = onSnapshot(q,(snap)=>{

    let html="";

    snap.forEach(d=>{
      let p=d.data();

      if(p.threadId===id){
        html+=`
        <div class="post">
          <b>${p.author}</b><br>
          ${p.content||""}
          ${p.image?`<img class="postimg" src="${p.image}">`:""}
        </div>`;
      }
    });

    document.getElementById("posts").innerHTML=html;
  });
}

/* ===== RENDER FORUM ===== */
function renderForum(){

  const q=query(collection(db,"threads"),orderBy("createdAt","desc"));

  if(unsub) unsub();

  unsub = onSnapshot(q,(snap)=>{

    let html="<h3>BOARD</h3>";

    snap.forEach(d=>{
      let t=d.data();

      html+=`
      <div class="post">
        <a onclick="openThread('${d.id}','${t.title}','${t.content}')">
          <b>${t.title}</b>
        </a><br>
        ${t.content}
      </div>`;
    });

    document.getElementById("app").innerHTML=html;
  });
}

renderForum();
</script>

</body>
</html>
