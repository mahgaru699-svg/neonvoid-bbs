<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEONVOID v14 STABLE</title>

<style>
body{
  font-family: Arial;
  background:#eef2ff;
  margin:20px;
}

.header{
  text-align:center;
}

.header img{
  max-width:420px;
  width:100%;
}

.nav a{
  color:#00f;
  margin:0 6px;
  cursor:pointer;
  text-decoration: underline;
}

.post{
  border:1px solid #ccc;
  background:#fff;
  padding:8px;
  margin:6px 0;
  word-break: break-word;
}

textarea{
  width:100%;
  height:90px;
}

button{
  margin:5px 0;
  cursor:pointer;
}

img.postimg{
  max-width:220px;
  display:block;
  margin-top:5px;
}

.replyref{
  color:blue;
  cursor:pointer;
}

.deleted{
  opacity:0.5;
  font-style:italic;
}

.footer{
  text-align:center;
  margin-top:60px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://i.ibb.co/Q3XDDHYB/Chat-GPT-Image-22-2026-04-20-35-1.png">
</div>

<div class="nav">
  <a onclick="showForum()">Forum</a>
  <a onclick="showRules()">Rules</a>
</div>

<button onclick="newThread()">New Thread</button>

<div id="app"></div>

<div class="footer">NEONVOID v14 STABLE</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

/* ===== FIREBASE ===== */
const firebaseConfig = {
  apiKey: "AIzaSyAtTTArBPBNHmZZJSytqjaRwA3nXvANBV0",
  authDomain: "neonevvvoid.firebaseapp.com",
  projectId: "neonevvvoid",
  storageBucket: "neonevvvoid.firebasestorage.app",
  messagingSenderId: "795809430469",
  appId: "1:795809430469:web:21f76f22dee7f7c14329ac"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* ===== STATE (STABLE CORE) ===== */
let state = {
  view:"forum",
  thread:null
};

/* ===== GLOBAL CACHE (IMPORTANT FIX) ===== */
let threadsCache = [];
let postsCache = [];

/* ===== USER ID ===== */
function user(){
  let id = localStorage.getItem("id");
  if(!id){
    id="anon-"+Math.floor(Math.random()*99999);
    localStorage.setItem("id",id);
  }
  return id;
}

/* ===== INIT LISTENERS ONCE (CRITICAL FIX) ===== */
const qThreads = query(collection(db,"threads"),orderBy("createdAt","desc"));
onSnapshot(qThreads,(snap)=>{
  threadsCache = snap.docs.map(d=>({id:d.id,...d.data()}));
  if(state.view==="forum") renderForum();
});

const qPosts = query(collection(db,"posts"));
onSnapshot(qPosts,(snap)=>{
  postsCache = snap.docs.map(d=>({id:d.id,...d.data()}));
});

/* ===== NAV ===== */
window.showForum = function(){
  state.view="forum";
  renderForum();
};

window.showRules = function(){
  document.getElementById("app").innerHTML=`
    <div class="post">
      <h3>RULES</h3>
      <p>Не мешай другим пользователям.</p>
      <p>Разрешено всё в рамках закона.</p>
      <p>Анонимность обязательна.</p>
    </div>`;
};

/* ===== THREAD CREATE ===== */
window.newThread = async function(){

  let t=prompt("Title:");
  let c=prompt("Text:");
  if(!t||!c) return;

  await addDoc(collection(db,"threads"),{
    title:t,
    content:c,
    createdAt:Date.now()
  });
};

/* ===== OPEN THREAD ===== */
window.openThread = function(id,t,c){

  state.thread=id;
  state.view="thread";

  document.getElementById("app").innerHTML=`
    <h3>${t}</h3>
    <div class="post">${c}</div>

    <textarea id="txt"></textarea>
    <input type="file" id="img">

    <button onclick="reply()">Reply</button>

    <div id="posts"></div>
  `;

  renderPosts();
};

/* ===== REPLY (FIXED IMAGE SAFE) ===== */
window.reply = async function(){

  let txt=document.getElementById("txt").value;
  let file=document.getElementById("img").files[0];

  let img=null;

  if(file){
    let r=ref(storage,"img/"+Date.now()+file.name);
    await uploadBytes(r,file);
    img=await getDownloadURL(r);
  }

  await addDoc(collection(db,"posts"),{
    threadId:state.thread,
    content:txt,
    author:user(),
    image:img,
    id:Date.now(),
    deleted:false
  });

  document.getElementById("txt").value="";
  document.getElementById("img").value="";
};

/* ===== SAFE RENDER FORUM ===== */
function renderForum(){

  let html="<h3>BOARD</h3>";

  for(let t of threadsCache){

    html+=`
    <div class="post">
      <a onclick="openThread('${t.id}','${t.title}','${t.content}')">
        <b>${t.title}</b>
      </a><br>
      ${t.content}
    </div>`;
  }

  document.getElementById("app").innerHTML=html;
}

/* ===== SAFE POSTS RENDER ===== */
function renderPosts(){

  let html="";

  for(let p of postsCache){

    if(p.threadId===state.thread){

      let text=p.content||"";

      /* >>reply highlight */
      text = text.replace(/>>(\d+)/g,
        `<span class="replyref">>>$1</span>`
      );

      html+=`
      <div class="post ${p.deleted?'deleted':''}">
        <b>${p.author}</b><br>
        ${text}
        ${p.image?`<img class="postimg" src="${p.image}">`:""}
      </div>`;
    }
  }

  document.getElementById("posts").innerHTML=html;
}

</script>

</body>
</html>
