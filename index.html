<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEONVOID.BBS v6</title>

<style>
body{
  font-family: Arial;
  background:#d6daf0;
  margin:20px;
  color:#000;
}

h2{
  color:#800000;
}

a{
  color:#0000ee;
  cursor:pointer;
  text-decoration: underline;
}

.post{
  border:1px solid #aaa;
  background:#f0e0d6;
  padding:8px;
  margin:8px 0;
}

textarea{
  width:100%;
  height:100px;
  border:1px solid #aaa;
}

button{
  margin:5px 0;
  background:#e0e0e0;
  border:1px solid #999;
  cursor:pointer;
}

button:hover{
  background:#ccc;
}

.admin{
  border:2px solid red;
  padding:10px;
  background:#fff;
}

img{
  max-width:250px;
  display:block;
  margin-top:5px;
}
</style>
</head>

<body>

<h2>NEONVOID.BBS v6</h2>

<div>
  <a onclick="board('deepweb')">Deep Web</a> |
  <a onclick="board('memes')">Memes</a> |
  <a onclick="board('tech')">Tech / Hacking</a> |
  <a onclick="board('life')">Random Life</a> |
  <a onclick="board('art')">Digital Art</a>
</div>

<hr>

<button onclick="newThread()">Новый тред</button>
<button onclick="adminPanel()">Админка</button>

<div id="forum"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy,
  updateDoc,
  doc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtTTArBPBNHmZZJSytqjaRwA3nXvANBV0",
  authDomain: "neonevvvoid.firebaseapp.com",
  projectId: "neonevvvoid",
  storageBucket: "neonevvvoid.firebasestorage.app",
  messagingSenderId: "795809430469",
  appId: "1:795809430469:web:21f76f22dee7f7c14329ac"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let currentBoard = "deepweb";
let currentThreadId = null;
let lastPostTime = 0;

/* ===== ANON ID ===== */
function getAnonId(){
  let id = localStorage.getItem("anonId");
  if(!id){
    id = "Anon#" + Math.floor(Math.random()*9000+1000);
    localStorage.setItem("anonId", id);
  }
  return id;
}

/* ===== SPAM ===== */
function spamCheck(){
  let now = Date.now();
  if(now - lastPostTime < 2000){
    alert("Слишком быстро");
    return false;
  }
  lastPostTime = now;
  return true;
}

/* ===== BOARDS ===== */
window.board = function(name){
  currentBoard = name;
  render();
};

/* ===== NEW THREAD ===== */
window.newThread = async function(){

  if(!spamCheck()) return;

  let title = prompt("Название треда:");
  if(!title) return;

  let text = prompt("Текст:");
  if(!text) return;

  await addDoc(collection(db, "threads"), {
    title,
    content: text,
    board: currentBoard,
    createdAt: Date.now(),
    bumpedAt: Date.now()
  });

  render();
};

/* ===== OPEN THREAD ===== */
window.openThread = async function(id, title, content){

  currentThreadId = id;

  document.getElementById("forum").innerHTML = `
    <h3>${title}</h3>
    <div class="post">${content}</div>

    <hr>

    <textarea id="replyText"></textarea>
    <input type="file" id="imgFile">
    <button onclick="sendReply()">Ответить</button>

    <div id="replies"></div>
  `;

  loadReplies(id);
};

/* ===== SEND REPLY ===== */
window.sendReply = async function(){

  if(!spamCheck()) return;

  let txt = document.getElementById("replyText").value;
  let file = document.getElementById("imgFile").files[0];

  let imageUrl = null;

  if(file){
    let storageRef = ref(storage, "images/" + Date.now() + file.name);
    await uploadBytes(storageRef, file);
    imageUrl = await getDownloadURL(storageRef);
  }

  await addDoc(collection(db, "posts"), {
    threadId: currentThreadId,
    content: txt,
    author: getAnonId(),
    postId: Date.now(),
    image: imageUrl,
    createdAt: Date.now()
  });

  await updateDoc(doc(db, "threads", currentThreadId), {
    bumpedAt: Date.now()
  });

  loadReplies(currentThreadId);
};

/* ===== QUOTES ===== */
function parseQuotes(text){
  return (text || "").replace(/>>(\d+)/g, '<span style="color:green">>>$1</span>');
}

/* ===== REPLIES ===== */
window.loadReplies = async function(threadId){

  const snap = await getDocs(collection(db, "posts"));

  let html = "";

  snap.forEach(d=>{
    let p = d.data();

    if(p.threadId === threadId){
      html += `
        <div class="post">
          <b>${p.author}</b> #${p.postId}<br>
          ${parseQuotes(p.content)}
          ${p.image ? `<img src="${p.image}">` : ""}
        </div>
      `;
    }
  });

  document.getElementById("replies").innerHTML = html;
};

/* ===== ADMIN (FIXED) ===== */
window.adminPanel = async function(){

  let pass = prompt("Admin password:");
  if(pass !== "admin123"){
    alert("Wrong password");
    return;
  }

  let snap = await getDocs(collection(db, "threads"));

  let html = `
    <div class="admin">
      <h3>ADMIN PANEL</h3>
      <p>Все треды:</p>
    </div>
  `;

  snap.forEach(d=>{
    let t = d.data();

    html += `
      <div class="post">
        <b>${t.title}</b><br>
        ${t.content}<br>
        <button onclick="deleteThread('${d.id}')">DELETE</button>
      </div>
    `;
  });

  document.getElementById("forum").innerHTML = html;
};

/* ===== DELETE THREAD ===== */
window.deleteThread = async function(id){
  await deleteDoc(doc(db, "threads", id));
  adminPanel();
};

/* ===== RENDER ===== */
async function render(){

  let names = {
    deepweb: "Deep Web Discussions",
    memes: "Memes & Chaos",
    tech: "Tech / Hacking",
    life: "Random Life Talk",
    art: "Digital Art / Creations"
  };

  let html = `<h3>${names[currentBoard]}</h3>`;

  const q = query(collection(db, "threads"), orderBy("bumpedAt","desc"));
  const snap = await getDocs(q);

  snap.forEach(d=>{
    let t = d.data();

    if(t.board === currentBoard){
      html += `
        <div class="post">
          <a onclick="openThread('${d.id}','${t.title}','${t.content}')">
            <b>${t.title}</b>
          </a><br>
          ${t.content}
        </div>
      `;
    }
  });

  document.getElementById("forum").innerHTML = html;
}

render();
</script>

</body>
</html>
