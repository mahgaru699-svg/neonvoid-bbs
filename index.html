<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEONVOID.BBS</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#eee;
  margin:20px;
}

a{
  color:blue;
  cursor:pointer;
  text-decoration: underline;
}

.post{
  border:1px solid #000;
  background:#fff;
  padding:8px;
  margin:8px 0;
}

textarea{
  width:100%;
  height:100px;
  margin-top:10px;
}

button{
  margin:5px 0;
}
</style>
</head>

<body>

<h2>NEONVOID.BBS</h2>

<div>
  <a onclick="board('b')">/b/</a> |
  <a onclick="board('tech')">/tech/</a> |
  <a onclick="board('random')">/random/</a>
</div>

<hr>

<button onclick="newThread()">Новый тред</button>

<div id="forum"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtTTArBPBNHmZZJSytqjaRwA3nXvANBV0",
  authDomain: "neonevvvoid.firebaseapp.com",
  projectId: "neonevvvoid",
  storageBucket: "neonevvvoid.firebasestorage.app",
  messagingSenderId: "795809430469",
  appId: "1:795809430469:web:21f76f22dee7f7c14329ac"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentBoard = "b";

/* смена доски */
window.board = function(name){
  currentBoard = name;
  render();
};

/* новый тред */
window.newThread = async function(){
  let title = prompt("Название треда:");
  if(!title) return;

  let text = prompt("Текст поста:");
  if(!text) return;

  await addDoc(collection(db, "threads"), {
    title: title,
    content: text,
    board: currentBoard,
    createdAt: Date.now()
  });

  render();
};

/* открыть тред */
window.openThread = async function(id, title, content){

  document.getElementById("forum").innerHTML = `
    <h3>${title}</h3>
    <div class="post">${content}</div>

    <hr>

    <textarea id="replyText"></textarea>
    <button onclick="sendReply('${id}')">Ответить</button>

    <div id="replies"></div>
  `;

  loadReplies(id);
};

/* отправка ответа */
window.sendReply = async function(threadId){

  let txt = document.getElementById("replyText").value;
  if(!txt) return;

  await addDoc(collection(db, "posts"), {
    threadId: threadId,
    content: txt,
    createdAt: Date.now()
  });

  loadReplies(threadId);
};

/* загрузка ответов */
window.loadReplies = async function(threadId){

  const snap = await getDocs(collection(db, "posts"));

  let html = "";

  snap.forEach(doc=>{
    let p = doc.data();

    if(p.threadId === threadId){
      html += `<div class="post">>> ${p.content}</div>`;
    }
  });

  document.getElementById("replies").innerHTML = html;
};

/* список тредов */
async function render(){

  let html = `<h3>/${currentBoard}/</h3>`;

  const q = query(collection(db, "threads"), orderBy("createdAt","desc"));
  const snap = await getDocs(q);

  snap.forEach(doc=>{
    let t = doc.data();

    if(t.board === currentBoard){
      html += `
        <div class="post">
          <a onclick="openThread('${doc.id}','${t.title}','${t.content}')">
            <b>${t.title}</b>
          </a><br>
          ${t.content}
        </div>
      `;
    }
  });

  document.getElementById("forum").innerHTML = html;
}

render();
</script>

</body>
</html>
