<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEONVOID.BBS v10 CORE</title>

<style>
body{
  font-family: Arial;
  background:#2f3b2f;
  margin:20px;
  color:#e6f2e6;
}

/* HEADER FIX (no crop) */
.header{
  text-align:center;
  margin-bottom:15px;
}

.header img{
  max-width:320px;
  width:100%;
  height:auto;
  display:block;
  margin:0 auto;
  border:2px solid #556b2f;
  box-shadow:0 0 15px #000;
  object-fit:contain;
}

/* NAV */
.nav a{
  color:#b6ff8a;
  margin:0 8px;
  cursor:pointer;
  text-decoration: underline;
  display:inline-block;
}

.post{
  border:1px solid #556b2f;
  background:#3f4f3f;
  padding:8px;
  margin:8px 0;
  word-break: break-word;
}

textarea{
  width:100%;
  height:100px;
  background:#1f2a1f;
  color:#e6f2e6;
  border:1px solid #556b2f;
}

button{
  margin:5px 0;
  background:#556b2f;
  border:1px solid #9acd32;
  color:#fff;
  cursor:pointer;
}

button:hover{
  background:#6b8e23;
}

img.postimg{
  max-width:220px;
  display:block;
  margin-top:5px;
  border:1px solid #556b2f;
}

.footer{
  text-align:center;
  margin-top:80px;
  font-size:11px;
  opacity:0.4;
}

.rules{
  background:#1f2a1f;
  padding:10px;
  border:1px solid #556b2f;
}

.gold{
  color:gold;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://i.ibb.co/xtYZ6sjK/Chat-GPT-Image-22-2026-04-20-35.png" alt="logo">

  <div class="nav">
    <a onclick="go('forum')">Forum</a>
    <a onclick="go('rules')">Rules</a>
    <a onclick="board('frontline')">Frontline</a>
    <a onclick="board('intel')">Intel</a>
    <a onclick="board('field')">Field</a>
  </div>
</div>

<button onclick="newThread()">New Thread</button>

<div id="app"></div>

<div class="footer">
  Created in 2026 — For you with soul
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  updateDoc,
  doc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtTTArBPBNHmZZJSytqjaRwA3nXvANBV0",
  authDomain: "neonevvvoid.firebaseapp.com",
  projectId: "neonevvvoid",
  storageBucket: "neonevvvoid.firebasestorage.app",
  messagingSenderId: "795809430469",
  appId: "1:795809430469:web:21f76f22dee7f7c14329ac"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* ===== STATE FIX (главный фикс) ===== */
let state = {
  view: "forum",
  board: "frontline",
  thread: null
};

/* ===== OWNER ===== */
function user(){
  return "adm15 👑";
}

/* ===== NAV SAFE ===== */
window.go = function(v){
  state.view = v;
  render();
};

window.board = function(b){
  state.board = b;
  state.view = "forum";
  render();
};

/* ===== THREAD ===== */
window.newThread = async function(){

  let t = prompt("Title:");
  let c = prompt("Text:");
  if(!t || !c) return;

  await addDoc(collection(db,"threads"),{
    title:t,
    content:c,
    board:state.board,
    createdAt:Date.now(),
    bumpedAt:Date.now()
  });
};

/* ===== OPEN THREAD (FIXED DOM RESET BUG) ===== */
window.openThread = function(id,t,c){

  state.thread = id;
  state.view = "thread";

  document.getElementById("app").innerHTML = `
    <h3>${t}</h3>
    <div class="post">${c}</div>

    <textarea id="txt"></textarea>
    <input type="file" id="img">
    <button onclick="reply()">Send</button>

    <div id="replies"></div>
  `;

  listen(id);
};

/* ===== REPLY FIX (NO LOSE INPUT BUG FIXED) ===== */
window.reply = async function(){

  let txt = document.getElementById("txt").value;
  let file = document.getElementById("img").files[0];

  if(!txt && !file) return;

  let img = null;

  if(file){
    let r = ref(storage,"img/"+Date.now()+file.name);
    await uploadBytes(r,file);
    img = await getDownloadURL(r);
  }

  await addDoc(collection(db,"posts"),{
    threadId: state.thread,
    content: txt,
    author: user(),
    image: img,
    id: Date.now()
  });

  await updateDoc(doc(db,"threads",state.thread),{
    bumpedAt:Date.now()
  });

  document.getElementById("txt").value = "";
  document.getElementById("img").value = "";
};

/* ===== RULES ===== */
function rules(){
  document.getElementById("app").innerHTML=`
  <div class="rules">
    <h3>RULES</h3>
    <p>Не мешай другим.</p>
    <p>Разрешено всё в рамках закона.</p>
    <p>Анонимность обязательна.</p>
  </div>`;
}

/* ===== REALTIME FIX (NO MULTIPLE LISTENERS BUG FIXED) ===== */
let unsub = null;

function listen(id){

  if(unsub) unsub(); // 🔥 FIX duplicate listeners

  const q = query(collection(db,"posts"));

  unsub = onSnapshot(q,(snap)=>{

    let html="";

    snap.forEach(d=>{
      let p=d.data();

      if(p.threadId===id){
        html+=`
        <div class="post">
          <b class="gold">${p.author}</b><br>
          ${p.content || ""}
          ${p.image ? `<img class="postimg" src="${p.image}">` : ""}
        </div>`;
      }
    });

    let el = document.getElementById("replies");
    if(el) el.innerHTML = html;
  });
}

/* ===== RENDER SAFE ===== */
function render(){

  if(state.view === "rules") return rules();

  const q = query(collection(db,"threads"),orderBy("bumpedAt","desc"));

  onSnapshot(q,(snap)=>{

    let html = `<h3>${state.board.toUpperCase()}</h3>`;

    snap.forEach(d=>{
      let t = d.data();

      if(t.board === state.board){

        html += `
        <div class="post">
          <a onclick="openThread('${d.id}','${t.title}','${t.content}')">
            <b>${t.title}</b>
          </a><br>
          ${t.content}
        </div>`;
      }
    });

    document.getElementById("app").innerHTML = html;
  });
}

render();
</script>

</body>
</html>
